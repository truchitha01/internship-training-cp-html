    <body>
        <a href="index.html">Topic Home</a><br>
        <button type="button" id="btn">Click Me</button>
        <label>Button has been clicked the following number of times</label>
        <input type="text" id="counterInput" value="0">
        <script>
            let button=document.getElementById('btn');
            let count=0;
            let countDisplay = document.getElementById("counterInput")
            button.addEventListener('click',(event)=>{
                console.log(event.type)
                countDisplay.value = count++;
            })
             button.addEventListener('mouseenter',(event)=>{
                console.log(event.type)
            })
            button.addEventListener('mouseleave',(event)=>{
                console.log(event.type)
            })
            
        </script>
    </body>
