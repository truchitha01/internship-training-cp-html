    <body>
        <a href="index.html">Topic Home</a><br>
        <script>
            //1.Conditional and Control
            //if statement
            let age=10;
            if(age>=18){
                console.log("You are an adult");
            }
            //if-else statement
            let temperature = 25;
            if(temperature > 30){
                console.log("It's hot!")
            }else{
                console.log("It's cold!")
            }
            //if-else-if statment
            let score = 85;
            if(score >=90){
                console.log("Grade A");
            }else if(score >= 80){
                console.log("Grade B");                
            }else if(score >= 70){
                console.log("Grade C");                
            }else if(score >= 60){
                console.log("Grade D");                
            }else{
                console.log("Grade F")
            }
            //switch statment
            let day = 'Monday';
            switch(day){
                case 'Monday' : console.log("Start of the Work Week");
                                break;
                case 'Friday' : console.log("Almost Weekend");
                                break;
                case 'Saturday' :
                case 'Sunday' : console.log("Weekend");
                                break;
                default: console.log("Mid week day")

            }
            //ternary operator
            let status = age >= 18 ? 'Adult' : 'Minor' ;

            //2.Loop
            //For Loop
            for(let i=1;i<5;i++){
                console.log(i)
            }
            //While Loop
            let count =1;
            while(count <=5 ){
                console.log(count);
                count++;
            }
            //Do Whiel Loop
            let numb =10;
            do{
                console.log(numb);
                numb++
            }while(numb<=5)
            //For..of Loop
            let colors = ['Red','Green','Blue']
            for(let color of colors){
                console.log(color)
            }
            //For..in Loop
            let person = {
                name : 'Dennis',
                age : 30,
                city : 'Bangalore'
            }
            for (let key in person){
                console.log(key + ':' + person[key])
            }
            //Break
            for(let x=0;x<=20;x++){
                if(x==10) break;
                console.log('x ='+x)
            }
            // Continue
            for(let y=0;y<=7;y++){
                if(y == 3)continue;
                console.log('y = '+y)
            }

        </script>
    </body>
